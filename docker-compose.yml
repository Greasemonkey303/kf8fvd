services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Provide non-sensitive build args here; sensitive values are supplied
      # as build-time secrets (see ./secrets/* files).
      args:
        NODE_ENV: ${NODE_ENV:-production}
        DB_HOST: ${DB_HOST:-host.docker.internal}
        DB_PORT: ${DB_PORT:-3307}
        DB_USER: ${DB_USER:-kf8fvd}
        DB_NAME: ${DB_NAME:-kf8fvd}
        REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379}
        # For local debugging we force report-only and allow inline styles/scripts
        # to avoid blocking client-side injected markup (Turnstile/widget) and
        # inline React style/script pieces during development builds.
        CSP_REPORT_ONLY: 1
        CSP_ALLOW_INLINE: 1
        NEXT_PUBLIC_CF_TURNSTILE_SITEKEY: ${NEXT_PUBLIC_CF_TURNSTILE_SITEKEY:-}
        NEXT_PUBLIC_MINIO_BASE_URL: ${NEXT_PUBLIC_MINIO_BASE_URL:-http://host.docker.internal:9000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://localhost}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://localhost}
      # Build-time secrets are optional; do not require local secret files here.
    image: kf8fvd-app:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    restart: unless-stopped

# Note: Docker Compose `secrets` mappings were removed to avoid requiring
# placeholder secret files in the repository. Runtime secrets should be
# supplied via `.env.docker` or a secrets provider. Build-time secrets in
# the Dockerfile are optional and will be conditionally read if provided.
