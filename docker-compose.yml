services:
  kf8fvd:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        DB_HOST: db
        DB_PORT: 3306
        DB_USER: ${MYSQL_USER}
        DB_PASSWORD: ${MYSQL_PASSWORD}
        DB_NAME: ${MYSQL_DATABASE}
        REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
        CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-0}
        CSP_ALLOW_INLINE: ${CSP_ALLOW_INLINE:-0}
        NEXT_PUBLIC_CF_TURNSTILE_SITEKEY: ${NEXT_PUBLIC_CF_TURNSTILE_SITEKEY:-}
        NEXT_PUBLIC_MINIO_BASE_URL: ${NEXT_PUBLIC_MINIO_BASE_URL:-https://kf8fvd.com/s3}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kf8fvd.com}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://kf8fvd.com}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
        ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    image: kf8fvd-app:latest
    container_name: kf8fvd
    restart: always
    ports:
      - "127.0.0.1:3030:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: ${MINIO_USE_SSL:-0}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      NEXT_PUBLIC_S3_BUCKET: ${NEXT_PUBLIC_S3_BUCKET:-kf8fvd}
      NEXT_PUBLIC_MINIO_BASE_URL: ${NEXT_PUBLIC_MINIO_BASE_URL:-https://kf8fvd.com/s3}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kf8fvd.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://kf8fvd.com}
      INTERNAL_APP_ORIGIN: ${INTERNAL_APP_ORIGIN:-http://kf8fvd:3000}
      CF_TURNSTILE_BYPASS: "0"
      CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-0}
      CSP_ALLOW_INLINE: ${CSP_ALLOW_INLINE:-0}
    entrypoint: ["node", "/usr/local/bin/docker-entrypoint.js"]
    depends_on:
      - db
      - minio
      - redis
    networks:
      - kf8fvd-net

  db:
    image: mysql:8.4
    container_name: kf8fvd-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - kf8fvd-net

  minio:
    image: quay.io/minio/minio:latest
    container_name: kf8fvd-minio
    restart: always
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - kf8fvd-net

  redis:
    image: redis:7.4-alpine
    container_name: kf8fvd-redis
    restart: always
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    networks:
      - kf8fvd-net

  proxy:
    image: nginx:alpine
    container_name: kf8fvd-proxy
    restart: always
    depends_on:
      - kf8fvd
      - minio
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/cloudflare/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - kf8fvd-net

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: kf8fvd-tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - proxy
    networks:
      - kf8fvd-net

networks:
  kf8fvd-net:
    driver: bridge
