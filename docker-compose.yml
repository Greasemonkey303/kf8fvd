services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Provide non-sensitive build args here; sensitive values are supplied
      # as build-time secrets (see ./secrets/* files).
      args:
        NODE_ENV: ${NODE_ENV:-production}
        DB_HOST: ${DB_HOST:-host.docker.internal}
        DB_PORT: ${DB_PORT:-3307}
        DB_USER: ${DB_USER:-kf8fvd}
        DB_NAME: ${DB_NAME:-kf8fvd}
        REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379}
        # For local debugging we force report-only and allow inline styles/scripts
        # to avoid blocking client-side injected markup (Turnstile/widget) and
        # inline React style/script pieces during development builds.
        CSP_REPORT_ONLY: 1
        CSP_ALLOW_INLINE: 1
        NEXT_PUBLIC_CF_TURNSTILE_SITEKEY: ${NEXT_PUBLIC_CF_TURNSTILE_SITEKEY:-}
        NEXT_PUBLIC_MINIO_BASE_URL: ${NEXT_PUBLIC_MINIO_BASE_URL:-http://host.docker.internal:9000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      secrets:
        - nextauth_secret
        - encryption_key
        - db_password
        - redis_url
        - admin_basic_user
        - admin_basic_password
    image: kf8fvd-app:latest
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    secrets:
      - nextauth_secret
      - encryption_key
      - db_password
      - redis_url
      - admin_basic_user
      - admin_basic_password
      - admin_api_key
    restart: unless-stopped

secrets:
  nextauth_secret:
    file: ./secrets/nextauth_secret
  encryption_key:
    file: ./secrets/encryption_key
  db_password:
    file: ./secrets/db_password
  redis_url:
    file: ./secrets/redis_url
  admin_basic_user:
    file: ./secrets/admin_basic_user
  admin_basic_password:
    file: ./secrets/admin_basic_password
  admin_api_key:
    file: ./secrets/admin_api_key
