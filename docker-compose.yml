services:
  kf8fvd:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: ${NODE_ENV:-production}
        DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
        DB_PORT: ${DOCKER_DB_PORT:-3306}
        DB_USER: ${DB_USER}
        DB_PASSWORD: ${DB_PASSWORD}
        DB_NAME: ${DB_NAME}
        REDIS_URL: ${DOCKER_REDIS_URL:-redis://host.docker.internal:6379}
        REDIS_HOST: ${DOCKER_REDIS_HOST:-host.docker.internal}
        REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
        CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-0}
        CSP_ALLOW_INLINE: ${CSP_ALLOW_INLINE:-0}
        NEXT_PUBLIC_CF_TURNSTILE_SITEKEY: ${NEXT_PUBLIC_CF_TURNSTILE_SITEKEY:-}
        NEXT_PUBLIC_MINIO_BASE_URL: ${NEXT_PUBLIC_MINIO_BASE_URL:-https://kf8fvd.com/s3}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kf8fvd.com}
        NEXT_PUBLIC_UMAMI_HOST_URL: ${NEXT_PUBLIC_UMAMI_HOST_URL:-}
        NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
        NEXT_PUBLIC_UMAMI_DOMAINS: ${NEXT_PUBLIC_UMAMI_DOMAINS:-}
        UMAMI_SERVER_URL: ${DOCKER_UMAMI_SERVER_URL:-http://umami:3000}
        UMAMI_POSTGRES_HOST: ${DOCKER_UMAMI_POSTGRES_HOST:-umami-db}
        UMAMI_POSTGRES_PORT: ${DOCKER_UMAMI_POSTGRES_PORT:-5432}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-https://kf8fvd.com}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
        ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    image: kf8fvd-app:latest
    container_name: kf8fvd
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: ${DOCKER_DB_HOST:-host.docker.internal}
      DB_PORT: ${DOCKER_DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://host.docker.internal:6379}
      REDIS_HOST: ${DOCKER_REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${DOCKER_REDIS_PORT:-6379}
      MINIO_HOST: ${DOCKER_MINIO_HOST:-host.docker.internal}
      MINIO_PORT: ${DOCKER_MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-0}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      NEXT_PUBLIC_S3_BUCKET: ${NEXT_PUBLIC_S3_BUCKET:-kf8fvd}
      NEXT_PUBLIC_MINIO_BASE_URL: ${NEXT_PUBLIC_MINIO_BASE_URL:-https://kf8fvd.com/s3}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://kf8fvd.com}
      NEXT_PUBLIC_UMAMI_HOST_URL: ${NEXT_PUBLIC_UMAMI_HOST_URL:-}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      NEXT_PUBLIC_UMAMI_DOMAINS: ${NEXT_PUBLIC_UMAMI_DOMAINS:-}
      UMAMI_SERVER_URL: ${DOCKER_UMAMI_SERVER_URL:-http://umami:3000}
      UMAMI_POSTGRES_HOST: ${DOCKER_UMAMI_POSTGRES_HOST:-umami-db}
      UMAMI_POSTGRES_PORT: ${DOCKER_UMAMI_POSTGRES_PORT:-5432}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://kf8fvd.com}
      INTERNAL_APP_ORIGIN: ${DOCKER_INTERNAL_APP_ORIGIN:-http://kf8fvd:3000}
      CF_TURNSTILE_BYPASS: "0"
      CSP_REPORT_ONLY: ${CSP_REPORT_ONLY:-0}
      CSP_ALLOW_INLINE: ${CSP_ALLOW_INLINE:-0}
    entrypoint: ["node", "/usr/local/bin/docker-entrypoint.js"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kf8fvd-net

  umami-db:
    image: postgres:16-alpine
    container_name: kf8fvd-umami-db
    restart: always
    environment:
      POSTGRES_DB: ${UMAMI_POSTGRES_DB:-umami}
      POSTGRES_USER: ${UMAMI_POSTGRES_USER:-umami}
      POSTGRES_PASSWORD: ${UMAMI_POSTGRES_PASSWORD:-change-me}
    volumes:
      - umami-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_POSTGRES_USER:-umami} -d ${UMAMI_POSTGRES_DB:-umami}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kf8fvd-net

  umami:
    image: docker.umami.is/umami-software/umami:latest
    container_name: kf8fvd-umami
    restart: always
    environment:
      DATABASE_URL: postgresql://${UMAMI_POSTGRES_USER:-umami}:${UMAMI_POSTGRES_PASSWORD:-change-me}@umami-db:5432/${UMAMI_POSTGRES_DB:-umami}
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me}
      TRACKER_SCRIPT_NAME: ${UMAMI_TRACKER_SCRIPT_NAME:-script.js}
      CLIENT_IP_HEADER: ${UMAMI_CLIENT_IP_HEADER:-x-forwarded-for}
    depends_on:
      umami-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - kf8fvd-net

networks:
  kf8fvd-net:
    driver: bridge

volumes:
  umami-postgres:
