name: Example - Fetch secrets from Azure Key Vault
on: [workflow_dispatch]

jobs:
  fetch-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (requires AZURE_CREDENTIALS secret)
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get secrets from Key Vault
        id: keyvault
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: your-keyvault-name
          secrets: DB_PASSWORD,REDIS_URL,NEXTAUTH_SECRET,ENCRYPTION_KEY

      - name: Show masked example (do not print secrets)
        run: |
          echo "Secrets fetched to environment for downstream steps"

      - name: Example use
        run: |
          # downstream build steps can access secrets via $DB_PASSWORD, $REDIS_URL, etc.
          echo "Running build with secrets available to environment"

# Note: replace `your-keyvault-name` with your Key Vault name and configure the
# `AZURE_CREDENTIALS` secret (service principal JSON) in the repository settings.