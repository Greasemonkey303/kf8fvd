name: Require Production Secrets

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets are set
        run: |
          set -e
          echo "Checking required secrets..."
          if [ -z "${{ secrets.NEXTAUTH_SECRET }}" ]; then echo "Missing NEXTAUTH_SECRET"; exit 1; fi
          if [ -z "${{ secrets.ENCRYPTION_KEY }}" ]; then echo "Missing ENCRYPTION_KEY"; exit 1; fi
          if [ -z "${{ secrets.CF_TURNSTILE_SECRET }}" ]; then echo "Missing CF_TURNSTILE_SECRET"; exit 1; fi
          if [ -z "${{ secrets.REDIS_URL }}" ]; then echo "Missing REDIS_URL"; exit 1; fi
          echo "All required secrets present."
