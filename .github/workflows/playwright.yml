name: Playwright E2E (staging)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      CF_TURNSTILE_SITEKEY: ${{ secrets.CF_TURNSTILE_SITEKEY }}
      CF_TURNSTILE_SECRET: ${{ secrets.CF_TURNSTILE_SECRET }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run E2E tests (against SITE_URL)
        run: npx playwright test --project=chromium --reporter=list
