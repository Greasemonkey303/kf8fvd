name: Integration Tests (unit + redis)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Wait for Redis
        run: |
          for i in {1..30}; do nc -z localhost 6379 && break || sleep 1; done
      - name: Run unit + integration tests
        env:
          REDIS_URL: redis://127.0.0.1:6379
        run: npx vitest run tests/unit tests/integration
