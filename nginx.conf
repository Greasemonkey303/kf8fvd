events {
    worker_connections 1024;
}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream kf8fvd_app {
        server kf8fvd:3000;
    }

    upstream kf8fvd_minio_api {
        server minio:9000;
    }

    upstream kf8fvd_minio_console {
        server minio:9001;
    }

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Set the upload limit to exactly 500MB
    client_max_body_size 500M;
    
    # Standard production timeouts
    proxy_connect_timeout 90;
    proxy_send_timeout 300;
    proxy_read_timeout 300;

    server {
        listen 80;
        server_name kf8fvd.com www.kf8fvd.com;

        return 301 https://kf8fvd.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name www.kf8fvd.com;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        return 301 https://kf8fvd.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kf8fvd.com;

        # Paths to the certificates you found in /etc/cloudflare/certs/
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Recommended SSL Hardening for Full/Strict
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # 1. Next.js App
        location / {
            proxy_pass http://kf8fvd_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # 2. MinIO S3 API
        location /s3/ {
            proxy_pass http://kf8fvd_minio_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # 3. MinIO Browser Console
        location /minio-admin/ {
            proxy_pass http://kf8fvd_minio_console/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
